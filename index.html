<!DOCTYPE html>
<html>
<head>
    <meta charset="utf8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans|Open+Sans+Condensed:300|Roboto" rel="stylesheet"> 
    <link href='https://fonts.googleapis.com/css?family=Ek+Mukta:300' rel='stylesheet' type='text/css'>

    <!-- Firebase SDK (Version 8 – Compatible) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script type="text/javascript">
        // ============================================================
        // FIREBASE CONFIGURATION – REPLACE WITH YOUR ACTUAL CONFIG!
        // ============================================================
        // Go to Firebase Console > Project Settings > Your apps > SDK setup and configuration
        // Copy the `firebaseConfig` object and paste it below.
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyANM1GYXJr5YQDPwVtPKRvOge4B7rAI7k",
            authDomain: "iit-database-task.firebaseapp.com",
            projectId: "iit-database-task",
            storageBucket: "iit-database-task.firebasestorage.app",
            messagingSenderId: "161419611660",
            appId: "1:161419611660:web:7b8c607fd6e12d910be829",
            measurementId: "G-TGTWTRZKZ5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log("✅ Firebase initialized – ready to save taps");

        // ============================================================
        // EXPERIMENT VARIABLES
        // ============================================================
        var totalTouchDuration = 0;
        var tapCounter = 0;
        var startTap = 0, endTap = 0;
        var tapSessionStartTime = 0;
        var tapLog = "";
        var tapLogsArray = [];

        var tapLimit = 50; 
        var tapTimeOut = 60; // seconds
        var uniqueIdentifier = 0;
        var d;
        var dependentVariable = "";

        var showFeedback = false;
        var interfaceVariations = 2;
        var interfaceSequence = 1;

        // ============================================================
        // PAGE LOAD
        // ============================================================
        function onLoad(){
            var el = document.getElementById('tapHere');
            d = new Date();

            if(d.getTime() % 2 == 0){
                showFeedback = true;
            }

            uniqueIdentifier = d.getTime();
            var randomNumber = Math.floor(Math.random() * 42);
            uniqueIdentifier = uniqueIdentifier + "" + randomNumber;

            ["mouseup","mousedown","touchstart","touchend"].forEach(function(te) {
                el.addEventListener(te, tapityTap);
            });
        }

        function saveDependentVariable(dVariable){
            dependentVariable = dVariable;
            document.getElementById("buttoncontainer").style.display = "none";
            document.getElementById("container").style.display = "inline-block";
        }
        window.saveDependentVariable = saveDependentVariable; 

        // ============================================================
        // FIREBASE SYNC – REPLACES PHP BACKEND
        // ============================================================
        function syncToServer(){
            // Parse the stored tap strings back into objects
            const taps = tapLogsArray.map(tapStr => JSON.parse(tapStr));
            
            // Device platform comes from the button click ('android' or 'pc')
            const platform = dependentVariable; 
            
            // Use a batch to save all taps in one atomic operation
            const batch = db.batch();
            
            taps.forEach(tap => {
                // Create a new document with auto-generated ID
                const docRef = db.collection("tap_logs").doc();
                
                batch.set(docRef, {
                    sequence_number: tap.tapSequenceNumber,
                    start_time: tap.startTimestamp,
                    end_time: tap.endTimestamp,
                    interface_type: tap.interface,          // "feedbackshown" or "nofeedback"
                    session_id: uniqueIdentifier,
                    device_platform: platform,               // "android" or "pc"
                    interface_sequence: tap.interfaceSequence,
                    saved_at: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
            
            batch.commit()
                .then(() => {
                    console.log("✅ All taps saved to Firestore!");
                    document.getElementById("container").innerHTML = 
                        '<span class="spanWhite">Thank you! Your data has been recorded.</span>';
                })
                .catch((error) => {
                    console.error("❌ Firestore Error:", error);
                    document.getElementById("container").innerHTML = 
                        '<span class="spanWhite">Error saving data. Please try again.</span>';
                });
        }

        // ============================================================
        // TAP HANDLER
        // ============================================================
        function tapityTap(tep){
            d = new Date();
            var te = tep.type;

            document.getElementById("action").innerHTML = te;
            console.log("Ready:" + te);

            switch(te){
                case "touchstart":
                    tep.preventDefault();
                case "mousedown":
                    startTap = d.getTime();
                    if(tapSessionStartTime == 0)
                        tapSessionStartTime = startTap;
                    break;

                case "touchend":
                    tep.preventDefault();
                case "mouseup":
                    endTap = d.getTime();
                    var duration = (endTap - startTap);
                    
                    if(startTap == 0 || endTap == 0){
                        tapLog += "<br>Tap #" + tapCounter + "; One of the timestamps is 0.";
                    } else if(startTap > 0 && endTap > 0 && (startTap > endTap)){
                        // Invalid state – skip
                    } else {
                        console.log("Tap #" + tapCounter + "; Tap duration:" + duration + " ms");
                        tapCounter++;    
                        totalTouchDuration += duration;
                        var meanTouchDuration = totalTouchDuration / tapCounter;

                        var tap = {};
                        tap["tapSequenceNumber"] = tapCounter;
                        tap["startTimestamp"] = startTap;
                        tap["endTimestamp"] = endTap;
                        tap["interfaceSequence"] = interfaceSequence;

                        if(showFeedback)
                            tap["interface"] = "feedbackshown";
                        else
                            tap["interface"] = "nofeedback";

                        tapLogsArray.push(JSON.stringify(tap));
                        
                        tapLog += "<br>Tap #" + tapCounter + "; Tap duration:" + duration + " ms";

                        // Check if we've reached the tap limit
                        if(tapCounter >= tapLimit){
                            interfaceSequence++;

                            if(interfaceSequence <= interfaceVariations){
                                document.getElementById("counter").innerHTML = 
                                    '<span class="spanWhite">Mean tap duration: <span class="spanTime">' + 
                                    Math.round(meanTouchDuration,2) + '</span> ms</span>';
                                document.getElementById("continue").style.display = "block";
                                document.getElementById("tapHere").style.display = "none";
                            } else {
                                document.getElementById("counter").innerHTML = 
                                    '<span class="spanWhite">Mean tap duration: <span class="spanTime">' + 
                                    Math.round(meanTouchDuration,2) + '</span> ms</span>';
                                document.getElementById("tapHere").style.display = "none";
                                syncToServer();   // 🔥 Save to Firestore
                            }
                            return;
                        }

                        if(showFeedback)
                            document.getElementById("counter").innerHTML = 
                                "Mean tap duration: <span class='spanTime'>" + 
                                Math.round(meanTouchDuration,2) + "</span> ms";
                    }

                    startTap = 0;
                    endTap = 0;
                    break;
            }
        }

        function startNext(){
            startTap = 0;
            endTap = 0;
            tapCounter = 0;
            totalTouchDuration = 0;
            document.getElementById("tapHere").style.display = "block";
            document.getElementById("continue").style.display = "none";
            document.getElementById("counter").innerHTML = "";
            
            // Toggle feedback for the next interface variation
            showFeedback = !showFeedback;
        }
    </script>
</head>

<body onLoad="onLoad()">
    <div>
        <div id="buttoncontainer">
            <button type="button" onclick="saveDependentVariable('android')" id="variable1">Android</button>
            <button type="button" onclick="saveDependentVariable('pc')" id="variable2">PC</button>
        </div>
        <div id="container" class="container">
            <div id="counter"></div>
            <div id="action"></div>
            <button id="tapHere"><img src="2x/round_touch_app_white_36dp.png"/></button>
            <button id="continue" onclick="startNext()">Continue</button>
        </div>
    </div>
</body>
</html>
